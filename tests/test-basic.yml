name: Test basic Haxe setup
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          haxe-version: '4.3.1'
      - name: Assert haxe is available
        run: |
          echo "Checking haxe binary..."
          if ! command -v haxe &>/dev/null; then
            echo "FAIL: haxe not found in PATH"
            exit 1
          fi
          echo "PASS: haxe found in PATH"
      - name: Assert haxe version
        run: |
          VERSION=$(haxe --version 2>&1 || true)
          echo "actual version: $VERSION"
          if [[ "$VERSION" != *"4.3.1"* ]]; then
            echo "FAIL: expected version 4.3.1, got: $VERSION"
            exit 1
          fi
          echo "PASS: haxe version matches"
